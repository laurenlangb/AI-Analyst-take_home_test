<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offers Data Table</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
    <script src="{{ url_for('static', path='data_table.js') }}" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <!-- Header row with the page title and loaded row count. -->
      <header class="data-table-header">
        <h1>Data Table</h1>
        <div class="header-meta">
          <span class="user-name">{{ user_name }}</span>
          <div class="status-pill" id="row-count">Loading</div>
        </div>
      </header>

      <section class="table-section" aria-label="Offers table">
        <div class="table-wrap">
          <table>
            <thead id="offers-head"></thead>
            <tbody id="offers-body">
              <tr>
                <td class="loading-cell">Loading offers...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="chat-section" aria-label="Chat with offer data">
        <h2>Ask About The Data</h2>

        <div class="chat-history" id="chat-history">
          <p class="chat-empty">{{ chat_placeholder }}</p>
        </div>

        <form class="chat-form" id="chat-form">
          <label class="sr-only" for="chat-input">Question</label>
          <input
            id="chat-input"
            name="message"
            type="text"
            placeholder="Ask about leases, finance rates, models, or offers"
            autocomplete="off"
          />
          <button type="submit">Ask</button>
        </form>
      </section>
    </main>
  </body>
</html>
